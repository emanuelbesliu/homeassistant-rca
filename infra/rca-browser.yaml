---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-browser
  namespace: flaresolverr
  labels:
    app: rca-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rca-browser
  template:
    metadata:
      labels:
        app: rca-browser
    spec:
      containers:
        - name: rca-browser
          image: ghcr.io/emanuelbesliu/rca-browser:v0.1.0-test3
          imagePullPolicy: Always
          ports:
            - containerPort: 8194
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: debug
            - name: HEADLESS
              value: "true"
            - name: TZ
              value: Europe/Bucharest
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8194
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8194
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rca-browser
  namespace: flaresolverr
  labels:
    app: rca-browser
spec:
  type: LoadBalancer
  selector:
    app: rca-browser
  ports:
    - port: 8194
      targetPort: 8194
      protocol: TCP
      name: http
